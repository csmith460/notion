<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRND Chart</title>
  <style>
    html, body {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      background: #FFFFFF;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chart-container {
      width: 100%;
      max-width: 900px;
      padding: 10px;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 40px);
      background: #FFFFFF;
      border: none;
      border-radius: 5px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="chart-container">
    <iframe
      referrerpolicy="origin"
      src="https://jika.io/embed/area-chart?symbol=MCE.AX&selection=ytd&closeKey=close&&graphColor=1652f0&textColor=161c2d&backgroundColor=FFFFFF&fontFamily=Nunito&"
    ></iframe>
  </div>
</body>
</html>
