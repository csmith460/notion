<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRND – 1 Year Price Chart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    iframe {
      display: block;
      width: 100%;
      height: 50vh;
      border: none;
      border-radius: 5px;
      box-shadow: 0 2px 4px 0 rgba(0,0,0,.2);
      background: #FFFFFF;
    }

    @media (orientation: landscape) {
      iframe {
        height: 100vw;
      }
    }
  </style>
</head>
<body>
  <iframe
    referrerpolicy="origin"
    src="https://jika.io/embed/area-chart?symbol=GRND&selection=one_year&closeKey=close&boxShadow=true&graphColor=1652f0&textColor=161c2d&backgroundColor=FFFFFF&fontFamily=Serif&">
  </iframe>
  <script>
    window.addEventListener('orientationchange', function() {
      var meta = document.querySelector('meta[name="viewport"]');
      meta.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0');
      setTimeout(function() {
        meta.setAttribute('content', 'width=device-width, initial-scale=1.0');
      }, 300);
    });
  </script>
</body>
</html>
