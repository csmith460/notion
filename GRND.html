<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRND Chart</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .chart-container {
      width: 100%;
      max-width: 900px;
    }
  </style>
</head>
<body>
  <div class="chart-container">
    <iframe
      referrerpolicy="origin"
      width="100%"
      height="470"
      style="background: #FFFFFF; padding: 10px; border: none; border-radius: 5px; box-shadow: 0 2px 4px 0 rgba(0,0,0,.2)"
      src="https://jika.io/embed/area-chart?symbol=GRND&selection=ytd&closeKey=close&&graphColor=1652f0&textColor=161c2d&backgroundColor=FFFFFF&fontFamily=Nunito&"
    ></iframe>
  </div>
</body>
</html>
